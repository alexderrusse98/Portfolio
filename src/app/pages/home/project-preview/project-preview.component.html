<section class="container">
   
        <div>
            <p>MY CRAFT</p>
            <div class="line">
                <h2>Projects</h2>
                <img class="line-img" src="assets/imgs/projects/projects_line.png" alt="">
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Dolores quis debitis esse rerum nisi, reiciendis illum quam reprehenderit? Non voluptas rerum, pariatur quibusdam cumque totam in? Hic sapiente voluptas amet.</p>
            </div>
        </div>

        <div class="project-card" *ngFor="let project of projects">
            <img src="{{ project.imageUrl }}" alt="{{ project.title }}">
            <img class="sticker" *ngIf="project.imgExtra" src="{{ project.imgExtra }}" alt="{{ project.title }}">
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>

        </div>
</section>
